{% extends "base.html" %}
{% block title %}{{ "Edit Loan #" ~ loan.loan_id if loan else "New Loan" }} — Library Lending{% endblock %}

{% block content %}
<h2>{{ "Edit Loan #" ~ loan.loan_id if loan else "New Loan" }}</h2>
<hr>

<form method="POST" style="max-width: 560px;">

  <!--
    Book dropdown — options loaded from the Books table (S2-J, S2-K).
    In the demo, point to _load_form_choices() in app.py to show the query.
  -->
  <div class="mb-3">
    <label for="book_id" class="form-label fw-semibold">Book</label>
    <select name="book_id" id="book_id" class="form-select" required>
      <option value="">— select a book —</option>
      {% for book in books %}
        <option value="{{ book.book_id }}"
          {% if loan and loan.book_id == book.book_id %}selected{% endif %}>
          {{ book.title }} &mdash; {{ book.genre }}
        </option>
      {% endfor %}
    </select>
  </div>

  <!--
    Member dropdown — options loaded from the Members table (S2-J, S2-K).
  -->
  <div class="mb-3">
    <label for="member_id" class="form-label fw-semibold">Member</label>
    <select name="member_id" id="member_id" class="form-select" required>
      <option value="">— select a member —</option>
      {% for member in members %}
        <option value="{{ member.member_id }}"
          {% if loan and loan.member_id == member.member_id %}selected{% endif %}>
          {{ member.name }}
        </option>
      {% endfor %}
    </select>
  </div>

  <div class="mb-3">
    <label for="loan_date" class="form-label fw-semibold">Loan Date</label>
    <input type="date" name="loan_date" id="loan_date" class="form-control" required
           value="{{ loan.loan_date if loan else default_loan_date }}">
  </div>

  <div class="mb-3">
    <label for="due_date" class="form-label fw-semibold">Due Date</label>
    <input type="date" name="due_date" id="due_date" class="form-control" required
           value="{{ loan.due_date if loan else default_due_date }}">
  </div>

  {% if loan %}
  <!--
    Return date is only shown when editing an existing loan.
    Leaving it blank keeps the loan active.
    "Mark Returned Today" fills in today's date via JavaScript.
  -->
  <div class="mb-3">
    <label for="return_date" class="form-label fw-semibold">
      Return Date
      <span class="text-muted fw-normal">(leave blank if not yet returned)</span>
    </label>
    <div class="input-group">
      <input type="date" name="return_date" id="return_date" class="form-control"
             value="{{ loan.return_date if loan.return_date else '' }}">
      <button type="button" class="btn btn-outline-success"
              onclick="document.getElementById('return_date').value =
                       new Date().toLocaleDateString('en-CA');">
        Mark Returned Today
      </button>
    </div>
    <div class="form-text">Current status: <strong>{{ loan.status }}</strong></div>
  </div>
  {% endif %}

  <div class="d-flex gap-2 mt-4">
    <button type="submit" class="btn btn-primary">
      {{ "Save Changes" if loan else "Add Loan" }}
    </button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
  </div>

</form>
{% endblock %}
